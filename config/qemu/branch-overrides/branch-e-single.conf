# Branch E: Single-GPU passthrough
# Same as Branch A/B but with hook-managed driver binding
# The start.sh hook unbinds from host before this runs
# The revert.sh hook returns GPU to host after VM stops

QEMU_ARGS+=(-device vfio-pci,host=${GPU_PCI},x-vga=on,multifunction=on)

if [[ -n "${AUDIO_PCI:-}" ]]; then
    QEMU_ARGS+=(-device vfio-pci,host=${AUDIO_PCI})
fi

# If Kepler, include ROM patch
if [[ "${ROM_PATCH:-false}" == "true" ]]; then
    # Replace the last vfio-pci entry with romfile version
    QEMU_ARGS[-$(( ${#QEMU_ARGS[@]} - ${#QEMU_ARGS[@]} + 1 ))]="-device vfio-pci,host=${GPU_PCI},x-vga=on,multifunction=on,romfile=/var/lib/macnix/firmware/gpu-vbios.rom"
fi

QEMU_ARGS+=(-device ivshmem-plain,memdev=ivshmem,bus=pcie.0)
QEMU_ARGS+=(-object memory-backend-file,id=ivshmem,share=on,mem-path=/dev/shm/looking-glass,size=64M)

# No display on host — output goes to physical GPU
QEMU_ARGS+=(-nographic -vga none)
