# Branch C: Intel iGPU — GVT-g mediated device
# Creates a virtual GPU slice from the Intel integrated graphics

# Create mdev if not already present
MDEV_PATH="/sys/bus/pci/devices/0000:${GPU_PCI}/mdev_supported_types/${MDEV_TYPE}/create"
if [[ ! -d "/sys/bus/mdev/devices/${MDEV_UUID}" ]]; then
    echo "${MDEV_UUID}" > "${MDEV_PATH}" 2>/dev/null || true
fi

QEMU_ARGS+=(-device vfio-pci,sysfsdev=/sys/bus/mdev/devices/${MDEV_UUID},display=on,x-igd-opregion=on)
QEMU_ARGS+=(-display gtk,gl=on)
