# Branch B: NVIDIA Kepler — VFIO passthrough with patched ROM
# Requires VBIOS ROM dump + Kepler patcher in macOS

QEMU_ARGS+=(-device vfio-pci,host=${GPU_PCI},x-vga=on,multifunction=on,romfile=/var/lib/macnix/firmware/gpu-vbios.rom)

if [[ -n "${AUDIO_PCI:-}" ]]; then
    QEMU_ARGS+=(-device vfio-pci,host=${AUDIO_PCI})
fi

QEMU_ARGS+=(-device ivshmem-plain,memdev=ivshmem,bus=pcie.0)
QEMU_ARGS+=(-object memory-backend-file,id=ivshmem,share=on,mem-path=/dev/shm/looking-glass,size=64M)
