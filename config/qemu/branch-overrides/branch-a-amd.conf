# Branch A: AMD discrete GPU — VFIO passthrough
# This file is sourced by the QEMU launch script
# GPU_PCI and AUDIO_PCI are set by phase5

# Remove software GPU, pass through AMD GPU directly
QEMU_ARGS+=(-device vfio-pci,host=${GPU_PCI},x-vga=on,multifunction=on)

# Pass companion HDMI audio if present
if [[ -n "${AUDIO_PCI:-}" ]]; then
    QEMU_ARGS+=(-device vfio-pci,host=${AUDIO_PCI})
fi

# Looking Glass IVSHMEM for display relay
QEMU_ARGS+=(-device ivshmem-plain,memdev=ivshmem,bus=pcie.0)
QEMU_ARGS+=(-object memory-backend-file,id=ivshmem,share=on,mem-path=/dev/shm/looking-glass,size=64M)
