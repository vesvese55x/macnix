name: Build MacNix ISO

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Force clean build (no cache)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    container: debian:bookworm
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install live-build tools
        run: |
          apt-get update
          apt-get install -y sudo git curl python3 live-build debootstrap xorriso squashfs-tools grub-efi-amd64-bin grub-pc-bin mtools dosfstools isolinux syslinux-common syslinux-utils

      - name: Cache bootstrap
        uses: actions/cache@v4
        with:
          path: build/cache
          key: lb-cache-bookworm-${{ hashFiles('scripts/phase7-build-iso.sh') }}
          restore-keys: lb-cache-bookworm-

      - name: Build ISO
        run: |
          bash scripts/phase7-build-iso.sh
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: macnix-iso-${{ github.run_number }}
          path: build/output/macnix-*.iso
          retention-days: 14
          compression-level: 0  # ISO is already compressed

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build/build.log
          retention-days: 7
