name: Build MacNix ISO

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Force clean build (no cache)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install live-build tools
        run: |
          apt-get update
          apt-get install -y sudo git curl python3 live-build debootstrap xorriso squashfs-tools grub-efi-amd64-bin grub-pc-bin mtools dosfstools isolinux syslinux-common syslinux-utils

      - name: Cache bootstrap
        uses: actions/cache@v4
        with:
          path: build/cache
          key: lb-cache-bookworm-${{ hashFiles('scripts/phase7-build-iso.sh') }}
          restore-keys: lb-cache-bookworm-

      - name: Build ISO
        run: |
          bash scripts/phase7-build-iso.sh
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: macnix-iso-${{ github.run_number }}
          path: build/output/macnix-*.iso
          retention-days: 14
          compression-level: 0  # ISO is already compressed

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build/build.log
          retention-days: 7

  test-iso:
    name: Test ISO Boot
    needs: build-iso
    runs-on: ubuntu-latest
    steps:
      - name: Install QEMU & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils socat imagemagick

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: macnix-iso-${{ github.run_number }}
          path: output/

      - name: Boot ISO in QEMU
        run: |
          ISO_FILE=$(ls output/macnix-*.iso | head -1)
          echo "Booting $ISO_FILE in background (TCG emulation)..."
          
          # Launch QEMU headlessly with a control socket
          sudo qemu-system-x86_64 \
            -m 4096 \
            -smp 2 \
            -cdrom "$ISO_FILE" \
            -vga std \
            -display none \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -daemonize
            
          echo "Waiting 180 seconds for XFCE desktop to load..."
          sleep 180
          
          echo "Capturing screenshot..."
          echo "screendump screenshot.ppm" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock
          
          # Convert PPM to PNG
          convert screenshot.ppm boot-screenshot.png
          
      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: boot-screenshot-${{ github.run_number }}
          path: boot-screenshot.png
          retention-days: 14
