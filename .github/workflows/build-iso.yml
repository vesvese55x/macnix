name: Build and Release MacNix ISO

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write  # GitHub Releases sekmesine ISO yükleyebilmek için gerekli izin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Temel bağımlılıkları kuruyoruz
          sudo apt-get install -y debootstrap xorriso squashfs-tools \
            grub-efi-amd64-bin grub-pc-bin mtools dosfstools isolinux \
            syslinux-common syslinux-utils || true
          
          # GitHub Runner'ın sürümüne göre (Örn: Ubuntu 24.04) live-build depoda bulunamazsa
          # Debian'ın kararlı resmi paketini indirip kurarak hata almasını engelliyoruz.
          sudo apt-get install -y live-build || {
            echo "live-build paketi depoda bulunamadı, manuel kuruluyor..."
            wget -q http://ftp.debian.org/debian/pool/main/l/live-build/live-build_20230502_all.deb
            sudo dpkg -i live-build_20230502_all.deb || sudo apt-get install -f -y
          }

      - name: Fix Calamares unpackfs configuration
        # Görselde aldığın "Hatalı unpackfs yapılandırması" hatasını çözmek için
        # repodaki calamares modüllerini otomatik tespit edip unpackfs.conf dosyasını düzeltiyoruz.
        run: |
          # 1. Standart live-build dizininde oluştur
          mkdir -p config/includes.chroot/etc/calamares/modules
          cat > config/includes.chroot/etc/calamares/modules/unpackfs.conf << 'EOF'
# SPDX-FileCopyrightText: no
# SPDX-License-Identifier: CC0-1.0
---
unpack:
    - source: "/run/live/medium/live/filesystem.squashfs"
      sourcefs: "squashfs"
      destination: ""
      imageType: "squashfs"
EOF
          
          # 2. Repo içinde yer alan tüm calamares modüllerini tara ve tamamını yamala
          find . -type d -name "modules" | grep "calamares" | while read -r dir; do
            echo "Düzeltiliyor: $dir/unpackfs.conf"
            cat > "$dir/unpackfs.conf" << 'EOF'
# SPDX-FileCopyrightText: no
# SPDX-License-Identifier: CC0-1.0
---
unpack:
    - source: "/run/live/medium/live/filesystem.squashfs"
      sourcefs: "squashfs"
      destination: ""
      imageType: "squashfs"
EOF
          done

      - name: Build ISO
        run: sudo bash scripts/phase7-build-iso.sh

      - name: Rename ISO to include -belgeselsemo
        # Çıkan ISO dosyasını bulup ismine otomatik olarak -belgeselsemo ekini ekler
        run: |
          cd build/output
          ISO_FILE=$(ls *.iso | head -n 1)
          if [ -n "$ISO_FILE" ]; then
            BASE_NAME="${ISO_FILE%.*}"
            NEW_NAME="${BASE_NAME}-belgeselsemo.iso"
            mv "$ISO_FILE" "$NEW_NAME"
            echo "Yeniden adlandırıldı: $ISO_FILE -> $NEW_NAME"
          else
            echo "ISO dosyası bulunamadı!"
            exit 1
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: macnix-iso-belgeselsemo
          path: build/output/*-belgeselsemo.iso

      - name: Create Release and Upload ISO
        # Pull Request dışındaki durumlarda ISO'yu otomatik olarak GitHub Releases sekmesine yükler
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}-belgeselsemo"
          name: "MacNix OS v${{ github.run_number }} (belgeselsemo)"
          body: |
            MacNix OS ISO dosyası başarıyla derlendi.
            
            ### Özellikler:
            - **ISO Dosyası:** `macnix-*-belgeselsemo.iso`
            - **Kurulum Hatası Giderildi:** Calamares `unpackfs` modülünün yaşadığı boş yapılandırma hatası çözüldü.
          draft: false
          prerelease: false
          files: build/output/*-belgeselsemo.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
