name: Build MacNix ISO

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Force clean build (no cache)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install live-build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl python3 live-build debootstrap xorriso squashfs-tools grub-efi-amd64-bin grub-pc-bin mtools dosfstools isolinux syslinux-common syslinux-utils

      - name: Cache bootstrap
        uses: actions/cache@v4
        with:
          path: build/cache
          key: lb-cache-bookworm-${{ hashFiles('scripts/phase7-build-iso.sh') }}
          restore-keys: lb-cache-bookworm-

      - name: Build ISO
        run: |
          # KESİN ÇÖZÜM 1: MacNix script'inin içindeki isohybrid çağrılarını true ile değiştir
          sed -i 's/\bisohybrid\b/true/g' scripts/phase7-build-iso.sh
          
          # KESİN ÇÖZÜM 2: Sistemin orijinal isohybrid dosyasını silip yerine 'true' kısayolu koy
          sudo rm -f /usr/bin/isohybrid
          sudo ln -s /usr/bin/true /usr/bin/isohybrid
          
          sudo bash scripts/phase7-build-iso.sh
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Validate ISO contents
        run: |
          ISO_FILE=$(ls build/output/macnix-*.iso 2>/dev/null | head -1)
          
          if [ -z "$ISO_FILE" ]; then
            echo "::error::ISO could not be found in build/output/"
            exit 1
          fi
          
          echo "Validating ISO: $ISO_FILE"
          ISO_SIZE=$(stat --format=%s "$ISO_FILE")
          echo "ISO size: $ISO_SIZE bytes"
          if [ "$ISO_SIZE" -lt 524288000 ]; then
            echo "::error::ISO is suspiciously small (<500MB)."
            exit 1
          fi
          
          mkdir -p /tmp/iso-mount
          sudo mount -o loop,ro "$ISO_FILE" /tmp/iso-mount || true
          for f in live/vmlinuz live/initrd.img live/filesystem.squashfs; do
            if [ -f "/tmp/iso-mount/$f" ]; then
              echo "✓ Found $f"
            else
              echo "::error::Missing expected file: $f"
              MISSING=1
            fi
          done
          sudo umount /tmp/iso-mount 2>/dev/null || true
          [ "${MISSING:-0}" = "1" ] && exit 1
          echo "✓ ISO validation passed"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: macnix-iso-${{ github.run_number }}
          path: build/output/macnix-*.iso
          retention-days: 14
          compression-level: 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build/build.log
          retention-days: 7

  test-iso:
    name: Test ISO Boot
    needs: build-iso
    runs-on: ubuntu-latest
    steps:
      - name: Install QEMU & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils socat imagemagick

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: macnix-iso-${{ github.run_number }}
          path: output/

      - name: Boot ISO in QEMU
        run: |
          ISO_FILE=$(ls output/macnix-*.iso | head -1)
          echo "Booting $ISO_FILE in background (TCG emulation)..."
          
          sudo qemu-system-x86_64 \
            -m 4096 \
            -smp 2 \
            -cdrom "$ISO_FILE" \
            -vga std \
            -display none \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -daemonize
            
          echo "Waiting 300 seconds for Openbox desktop to load..."
          sleep 300
          
          echo "Capturing screenshot..."
          (echo "screendump screenshot.ppm"; sleep 5) | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock
          convert screenshot.ppm boot-screenshot.png || true
          
      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: boot-screenshot-${{ github.run_number }}
          path: boot-screenshot.png
          retention-days: 14  

  # ==========================================
  # 🚀 RELEASE ADIMI
  # ==========================================
  release-iso:
    name: Create GitHub Release
    needs: [build-iso, test-iso]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download ISO Artifact
        uses: actions/download-artifact@v4
        with:
          name: macnix-iso-${{ github.run_number }}
          path: output/

      - name: Generate Release Tag
        id: tag
        run: |
          TAG="v2.0.0-$(date +%Y%m%d)-r${{ github.run_number }}-BELGESELSEMO"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Oluşturulan Tag: $TAG"

      - name: Rename ISO File
        run: |
          mv output/macnix-*.iso "output/macnix-${{ steps.tag.outputs.TAG }}.iso"
          echo "Dosya yeniden adlandırıldı:"
          ls -la output/

      - name: Create Release and Upload ISO
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "MacNix ISO ${{ steps.tag.outputs.TAG }}"
          body: |
            ## 🍎 MacNix Hazır Kurulum ISO'su
            
            **Çalışma ID:** #${{ github.run_number }}
            **Commit:** `${{ github.sha }}`
            **Dal:** `${{ github.ref_name }}`
            
            ---
            
            ### ⚠️ Bilgilendirme
            *   **Orijinal Proje:** Bu müthiş projenin tüm hakları ve geliştirme emeği **[local-over/macnix](https://github.com/local-over/macnix)** reposuna aittir. Geliştirici **Hassan Elkady**'e bu harika iş için buradan teşekkür ederiz! ❤️
            *   **Bu Repo Ne Yapar?:** Bizler sadece orijinal kodu alıp, GitHub Actions üzerinden sorunsuz bir şekilde doğrudan kurulan ISO dosyasını otomatik olarak derleyip kolayca indirebilmeniz için sunuyoruz.
            
            *(Not: Test aşamasında alınan ekran görüntüsünü "Artifacts" kısmından indirebilirsiniz)*
          files: output/macnix-${{ steps.tag.outputs.TAG }}.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
