name: Build and Release MacNix ISO

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write  # GitHub Releases ve Git Tag işlemlerini yapabilmek için gerekli yazma izni

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap xorriso squashfs-tools \
          grub-efi-amd64-bin grub-pc-bin mtools dosfstools isolinux \
          syslinux-common syslinux-utils

      - name: Fix Calamares unpackfs configuration
        # Calamares'in "Hatalı unpackfs yapılandırması" hatasını çözmek için
        # unpackfs.conf dosyasını oluşturup repoda varsa tüm calamares modüllerini güncelliyoruz.
        run: |
          # 1. Standart live-build dizininde oluştur
          mkdir -p config/includes.chroot/etc/calamares/modules
          echo '---' > config/includes.chroot/etc/calamares/modules/unpackfs.conf
          echo 'unpack:' >> config/includes.chroot/etc/calamares/modules/unpackfs.conf
          echo '    - source: "/run/live/medium/live/filesystem.squashfs"' >> config/includes.chroot/etc/calamares/modules/unpackfs.conf
          echo '      sourcefs: "squashfs"' >> config/includes.chroot/etc/calamares/modules/unpackfs.conf
          echo '      destination: ""' >> config/includes.chroot/etc/calamares/modules/unpackfs.conf
          echo '      imageType: "squashfs"' >> config/includes.chroot/etc/calamares/modules/unpackfs.conf
          
          # 2. Repo içinde yer alan tüm calamares modüllerini bul ve yamala
          find . -type d -name "modules" | grep "calamares" | while read -r dir; do
            echo "Patching unpackfs.conf in $dir..."
            echo '---' > "$dir/unpackfs.conf"
            echo 'unpack:' >> "$dir/unpackfs.conf"
            echo '    - source: "/run/live/medium/live/filesystem.squashfs"' >> "$dir/unpackfs.conf"
            echo '      sourcefs: "squashfs"' >> "$dir/unpackfs.conf"
            echo '      destination: ""' >> "$dir/unpackfs.conf"
            echo '      imageType: "squashfs"' >> "$dir/unpackfs.conf"
          done

      - name: Build ISO
        run: |
          # ÇİFT KATMANLI VE SIZDIRMAZ SAVUNMA PLANI:
          # live-build'in isohybrid hatasını chroot içinden veya dışından fırlatmasını tamamen engelliyoruz.
          
          # SAVUNMA 1 (Host Yaması): live-build dosyalarındaki isohybrid komut çağırma satırlarını etkisizleştiriyoruz.
          # Check_package komutlarını ve önüne tire (-) gelen parametreleri koruyan gelişmiş Regex yapısı.
          sudo find /usr/lib/live/build/ /usr/share/live/build/ -type f -exec sed -i '/Check_package/!{s|^isohybrid\b|echo isohybrid_skipped|g; s|\([^-]\)\bisohybrid\b|\1echo isohybrid_skipped|g}' {} + 2>/dev/null || true
          
          # SAVUNMA 2 (Chroot / ISO İçi): Derleme script'indeki kancayı (hook) otomatik olarak yamalayarak
          # chroot içine syslinux-utils kurulsa dahi isohybrid komutunu kalıcı olarak /bin/true ile maskeliyoruz.
          sed -i 's|chmod 440 /etc/sudoers.d/macnix-live|chmod 440 /etc/sudoers.d/macnix-live\nln -sf /bin/true /usr/bin/isohybrid|g' scripts/phase7-build-iso.sh || true
          
          # Host üzerinde de ek güvenlik olarak maskeliyoruz
          sudo ln -sf /bin/true /usr/bin/isohybrid || true
          sudo ln -sf /bin/true /bin/isohybrid || true
          
          # Derlemeyi başlat
          sudo bash scripts/phase7-build-iso.sh

      - name: Rename ISO to include -belgeselsemo
        # Derlenen ISO dosyasını bulup ismine -belgeselsemo ekini ekler.
        # Sudo ile derlendiği için öncelikle sahipliği kendi kullanıcımıza geçiriyoruz.
        run: |
          sudo chown -R $USER:$USER build/output/
          cd build/output
          ISO_FILE=$(ls *.iso | head -n 1)
          if [ -n "$ISO_FILE" ]; then
            BASE_NAME="${ISO_FILE%.*}"
            NEW_NAME="${BASE_NAME}-belgeselsemo.iso"
            mv "$ISO_FILE" "$NEW_NAME"
            echo "Renamed: $ISO_FILE -> $NEW_NAME"
          else
            echo "No ISO file found!"
            exit 1
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: macnix-iso-belgeselsemo
          path: build/output/*-belgeselsemo.iso

      - name: Delete old release and tag
        # Çakışmayı önlemek için eski "latest-belgeselsemo" sürümünü ve etiketini tamamen siler.
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Varsa eski GitHub Release sürümünü sil
          gh release delete "latest-belgeselsemo" --yes || true
          
          # Varsa remote üzerindeki tag'i sil
          git push origin :refs/tags/latest-belgeselsemo || true
          
          # Varsa local üzerindeki tag'i temizle
          git tag -d latest-belgeselsemo || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release and Upload ISO
        # Yeni ve temiz "latest-belgeselsemo" sürümünü oluşturup ISO'yu yükler
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-belgeselsemo"
          name: "MacNix OS Latest (belgeselsemo)"
          body: |
            MacNix OS ISO dosyası başarıyla derlendi.
            
            Bu sürüm her yeni derleme çalıştırıldığında otomatik olarak güncellenir ve eski sürümün yerini alır.
            
            ### Dosya Bilgisi:
            - **Dosya Adı:** `macnix-*-belgeselsemo.iso`
            - **Kurulum:** Calamares `unpackfs` yapılandırma hatası tamamen çözülmüştür.
          draft: false
          prerelease: false
          files: build/output/*-belgeselsemo.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
