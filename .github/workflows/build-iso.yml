name: Build and Release MacNix ISO

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write  # GitHub Releases oluşturabilmek ve ISO'yu yüklemek için gerekli izin

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu Runner)
        run: |
          echo "=== DISK SPACE BEFORE CLEANUP ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          echo "=== DISK SPACE AFTER CLEANUP ==="
          df -h

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          
          # Anahtarlık hatasını çözmek için debian-archive-keyring ve debian-keyring paketlerini ekledik.
          sudo apt-get install -y \
            debootstrap \
            debian-archive-keyring \
            debian-keyring \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            parted \
            curl \
            wget \
            git \
            rsync \
            cpio \
            gzip \
            bzip2 \
            xz-utils \
            zstd \
            apt-utils \
            whois \
            ovmf

          # live-build paketini Debian'ın resmi havuzundan manuel indirip kuruyoruz (Ubuntu 24.04 uyumlu)
          wget http://ftp.debian.org/debian/pool/main/l/live-build/live-build_20230502_all.deb
          sudo dpkg -i live-build_20230502_all.deb || sudo apt-get install -f -y

          # live-build'in Contents-amd64.gz hatasını yama ile gideriyoruz
          sudo sed -i 's|dists/${LB_PARENT_DISTRIBUTION}/Contents-${LB_ARCHITECTURES}.gz|dists/${LB_PARENT_DISTRIBUTION}/main/Contents-${LB_ARCHITECTURES}.gz|g' /usr/lib/live/build/lb_chroot_linux-image || true
          sudo sed -i 's|dists/${LB_DISTRIBUTION}/Contents-${LB_ARCHITECTURES}.gz|dists/${LB_DISTRIBUTION}/main/Contents-${LB_ARCHITECTURES}.gz|g' /usr/lib/live/build/lb_chroot_linux-image || true

      - name: Pre-download Contents cache for live-build
        run: |
          mkdir -p live-build-config/cache/contents.chroot
          curl -fL -o live-build-config/cache/contents.chroot/contents.bookworm.amd64.gz http://deb.debian.org/debian/dists/bookworm/main/Contents-amd64.gz
          gunzip -f live-build-config/cache/contents.chroot/contents.bookworm.amd64.gz

      - name: Configure live-build
        run: |
          mkdir -p live-build-config
          cd live-build-config
          sudo lb clean --purge

          lb config noauto \
            --architectures amd64 \
            --mode debian \
            --distribution bookworm \
            --archive-areas "main contrib non-free non-free-firmware" \
            --mirror-bootstrap http://deb.debian.org/debian \
            --mirror-chroot http://deb.debian.org/debian \
            --mirror-binary http://deb.debian.org/debian \
            --mirror-binary-security http://security.debian.org/debian-security \
            --mirror-chroot-security http://security.debian.org/debian-security \
            --binary-image iso-hybrid \
            --bootloader "syslinux,grub-efi" \
            --bootappend-live "boot=live components quiet splash" \
            --debian-installer none \
            --memtest none \
            --iso-application "MacNix OS" \
            --iso-preparer "MacNix" \
            --iso-publisher "MacNix" \
            --iso-volume "MACNIX_OS" \
            --linux-flavours amd64 \
            --security false \
            --backports false \
            --firmware-binary true \
            --firmware-chroot true \
            --apt-recommends true \
            --apt-indices false

      - name: Add package lists
        run: |
          cd live-build-config
          mkdir -p config/package-lists

          cat > config/package-lists/base.list.chroot << 'EOF'
          live-boot
          live-config
          live-config-systemd
          systemd-sysv
          sudo
          bash
          coreutils
          util-linux
          procps
          grep
          sed
          gawk
          findutils
          tar
          gzip
          bzip2
          xz-utils
          curl
          wget
          ca-certificates
          gnupg
          apt-transport-https
          locales
          keyboard-configuration
          console-setup
          tzdata
          EOF

          cat > config/package-lists/desktop.list.chroot << 'EOF'
          task-gnome-desktop
          gnome-core
          gnome-session
          gnome-shell
          gnome-terminal
          gnome-control-center
          gdm3
          network-manager
          network-manager-gnome
          pulseaudio
          firefox-esr
          calamares
          calamares-settings-debian
          EOF

          cat > config/package-lists/tools.list.chroot << 'EOF'
          nano
          vim
          htop
          neofetch
          git
          python3
          python3-pip
          EOF

      - name: Add hooks
        run: |
          cd live-build-config
          mkdir -p config/hooks/live

          cat > config/hooks/live/0010-fix-locale.hook.chroot << 'EOF'
          #!/bin/sh
          set -e
          echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
          locale-gen
          update-locale LANG=en_US.UTF-8
          EOF
          chmod +x config/hooks/live/0010-fix-locale.hook.chroot

          cat > config/hooks/live/0020-enable-gdm.hook.chroot << 'EOF'
          #!/bin/sh
          set -e
          systemctl enable gdm3 || true
          systemctl set-default graphical.target || true
          EOF
          chmod +x config/hooks/live/0020-enable-gdm.hook.chroot

          cat > config/hooks/live/0030-sudo-config.hook.chroot << 'EOF'
          #!/bin/sh
          set -e
          echo "user ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/live-user
          chmod 0440 /etc/sudoers.d/live-user
          EOF
          chmod +x config/hooks/live/0030-sudo-config.hook.chroot

      - name: Add includes and Calamares Config
        run: |
          cd live-build-config
          mkdir -p config/includes.chroot/etc/apt
          
          cat > config/includes.chroot/etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF
          
          mkdir -p config/includes.chroot/etc/macnix
          cat > config/includes.chroot/etc/macnix/version << 'EOF'
          MACNIX_VERSION="1.0"
          EOF

          # Calamares'in kurulum aşamasında hata vermemesi için gerekli yapılandırma
          mkdir -p config/includes.chroot/etc/calamares/modules
          cat > config/includes.chroot/etc/calamares/modules/unpackfs.conf << 'EOF'
          # SPDX-FileCopyrightText: no
          # SPDX-License-Identifier: CC0-1.0
          ---
          unpack:
              - source: "/run/live/medium/live/filesystem.squashfs"
                sourcefs: "squashfs"
                destination: ""
                imageType: "squashfs"
          EOF

      - name: Build ISO
        run: |
          cd live-build-config
          sudo rm -rf config/chroot_local-includes/
          
          sudo lb build 2>&1 | tee build.log
          
          if ls *.iso 1> /dev/null 2>&1; then
            echo "✅ ISO build successful!"
            mv *.iso ../macnix-belgeselsemo.iso
          else
            echo "❌ ISO build failed. Log dosyası yazdırılıyor:"
            cat build.log
            exit 1
          fi
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: macnix-os-iso-belgeselsemo
          path: macnix-belgeselsemo.iso
          if-no-files-found: error

      - name: Create Release and Upload Asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}-belgeselsemo"
          name: "MacNix OS v${{ github.run_number }} (belgeselsemo)"
          body: |
            MacNix OS ISO dosyası başarıyla derlendi.
            
            ### Değişiklikler ve Özellikler:
            - **Dosya Adı:** `macnix-belgeselsemo.iso`
            - **Kurulum Aracı:** Calamares installer yapılandırma hataları giderildi.
            - **Debian Tabanı:** Debian 12 (Bookworm)
            - **Özellikler:** macOS VM desteği, VFIO GPU Passthrough ve CPU Pinning.
            
            ### Kurulum Adımları:
            1. Aşağıdaki eklerden `macnix-belgeselsemo.iso` dosyasını indirin.
            2. ISO dosyasını **Rufus (DD modunda)** kullanarak en az 16 GB boyutundaki bir USB belleğe yazdırın.
            3. USB bellekten bilgisayarınızı başlatıp kuruluma başlayın.
          draft: false
          prerelease: false
          files: macnix-belgeselsemo.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
