name: Build and Release MacNix ISO

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write  # GitHub Releases ve Git Tag işlemlerini yapabilmek için gerekli yazma izni

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap xorriso squashfs-tools \
          grub-efi-amd64-bin grub-pc-bin mtools dosfstools isolinux \
          syslinux-common syslinux-utils

      - name: Fix Calamares unpackfs configuration
        # Calamares'in "Hatalı unpackfs yapılandırması" hatasını çözmek için
        # unpackfs.conf dosyasını oluşturup repoda varsa tüm calamares modüllerini güncelliyoruz.
        run: |
          # 1. Standart live-build dizininde oluştur
          mkdir -p config/includes.chroot/etc/calamares/modules
          echo '---' > config/includes.chroot/etc/calamares/modules/unpackfs.conf
          echo 'unpack:' >> config/includes.chroot/etc/calamares/modules/unpackfs.conf
          echo '    - source: "/run/live/medium/live/filesystem.squashfs"' >> config/includes.chroot/etc/calamares/modules/unpackfs.conf
          echo '      sourcefs: "squashfs"' >> config/includes.chroot/etc/calamares/modules/unpackfs.conf
          echo '      destination: ""' >> config/includes.chroot/etc/calamares/modules/unpackfs.conf
          echo '      imageType: "squashfs"' >> config/includes.chroot/etc/calamares/modules/unpackfs.conf
          
          # 2. Repo içinde yer alan tüm calamares modüllerini bul ve yamala
          find . -type d -name "modules" | grep "calamares" | while read -r dir; do
            echo "Patching unpackfs.conf in $dir..."
            echo '---' > "$dir/unpackfs.conf"
            echo 'unpack:' >> "$dir/unpackfs.conf"
            echo '    - source: "/run/live/medium/live/filesystem.squashfs"' >> "$dir/unpackfs.conf"
            echo '      sourcefs: "squashfs"' >> "$dir/unpackfs.conf"
            echo '      destination: ""' >> "$dir/unpackfs.conf"
            echo '      imageType: "squashfs"' >> "$dir/unpackfs.conf"
          done

      - name: Build ISO
        run: |
          # NOKTA ATIŞI VE KESİN ÇÖZÜM:
          # live-build motorunda ve kendi scriptlerimizde sadece ve sadece ISO dosyasına isohybrid uygulanan 
          # satırı devre dışı bırakıyoruz. Paket denetimlerine ve diğer komutlara asla dokunmuyoruz.
          
          # 1. live-build sistem dosyalarındaki isohybrid çalıştırma satırını etkisizleştir
          sudo find /usr/lib/live/build/ /usr/share/live/build/ -type f -exec sed -i 's|isohybrid.*binary.*\.iso|echo skipped_isohybrid|g' {} + 2>/dev/null || true
          
          # 2. scripts klasöründeki tüm dosyalarda yer alan isohybrid çalıştırma satırını etkisizleştir
          find scripts/ -type f -exec sed -i 's|isohybrid.*binary.*\.iso|echo skipped_isohybrid|g' {} + 2>/dev/null || true
          
          # Derlemeyi başlat
          sudo bash scripts/phase7-build-iso.sh

      - name: Rename ISO to include -belgeselseo
        # Derlenen ISO dosyasını bulup ismine -belgeselseo ekini ekler
        run: |
          cd build/output
          ISO_FILE=$(ls *.iso | head -n 1)
          if [ -n "$ISO_FILE" ]; then
            BASE_NAME="${ISO_FILE%.*}"
            NEW_NAME="${BASE_NAME}-belgeselseo.iso"
            mv "$ISO_FILE" "$NEW_NAME"
            echo "Renamed: $ISO_FILE -> $NEW_NAME"
          else
            echo "No ISO file found!"
            exit 1
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: macnix-iso-belgeselseo
          path: build/output/*-belgeselseo.iso

      - name: Delete old release and tag
        # Çakışmayı önlemek için eski "latest-belgeselseo" sürümünü ve etiketini tamamen siler.
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Varsa eski GitHub Release sürümünü sil
          gh release delete "latest-belgeselseo" --yes || true
          
          # Varsa remote üzerindeki tag'i sil
          git push origin :refs/tags/latest-belgeselseo || true
          
          # Varsa local üzerindeki tag'i temizle
          git tag -d latest-belgeselseo || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release and Upload ISO
        # Yeni ve temiz "latest-belgeselseo" sürümünü oluşturup ISO'yu yükler
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-belgeselseo"
          name: "MacNix OS Latest (belgeselseo)"
          body: |
            MacNix OS ISO dosyası başarıyla derlendi.
            
            Bu sürüm her yeni derleme çalıştırıldığında otomatik olarak güncellenir ve eski sürümün yerini alır.
            
            ### Dosya Bilgisi:
            - **Dosya Adı:** `macnix-*-belgeselseo.iso`
            - **Kurulum:** Calamares `unpackfs` yapılandırma hatası tamamen çözülmüştür.
          draft: false
          prerelease: false
          files: build/output/*-belgeselseo.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
