name: Build Debian ISO

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux \
            syslinux-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            grub-efi-amd64-signed \
            shim-signed \
            mtools \
            dosfstools \
            parted \
            curl \
            wget \
            git \
            rsync \
            cpio \
            gzip \
            bzip2 \
            xz-utils \
            zstd \
            apt-utils \
            whois \
            ovmf

      - name: Patch live-build security mirror scripts
        run: |
          # live-build'in kendi script dosyalarında bookworm/updates hard-coded geliyor
          # Bunları bulup bookworm-security ile değiştiriyoruz
          
          sudo find /usr/lib/live/build/ -type f | xargs sudo grep -l "bookworm/updates\|/updates" 2>/dev/null | while read f; do
            echo "Patching: $f"
            sudo sed -i \
              's|bookworm/updates|bookworm-security|g' \
              "$f"
          done

          sudo find /usr/share/live/build/ -type f | xargs sudo grep -l "bookworm/updates\|/updates" 2>/dev/null | while read f; do
            echo "Patching: $f"
            sudo sed -i \
              's|bookworm/updates|bookworm-security|g' \
              "$f"
          done

          # live-build config script'ini de patch et
          sudo find /usr/bin/ -name "lb*" -type f | xargs sudo grep -l "updates" 2>/dev/null | while read f; do
            echo "Patching lb binary: $f"
            sudo sed -i \
              's|bookworm/updates|bookworm-security|g' \
              "$f"
          done

          echo "✅ Patch complete"

      - name: Configure live-build
        run: |
          mkdir -p live-build-config
          cd live-build-config

          lb config noauto \
            --architectures amd64 \
            --mode debian \
            --distribution bookworm \
            --archive-areas "main contrib non-free non-free-firmware" \
            --mirror-bootstrap http://deb.debian.org/debian/ \
            --mirror-chroot http://deb.debian.org/debian/ \
            --mirror-binary http://deb.debian.org/debian/ \
            --mirror-binary-security http://security.debian.org/debian-security/ \
            --mirror-chroot-security http://security.debian.org/debian-security/ \
            --binary-image iso-hybrid \
            --bootloader "syslinux,grub-efi" \
            --bootappend-live "boot=live components quiet splash" \
            --debian-installer none \
            --memtest none \
            --iso-application "MacNix OS" \
            --iso-preparer "MacNix" \
            --iso-publisher "MacNix" \
            --iso-volume "MACNIX_OS" \
            --linux-flavours amd64 \
            --security true \
            --backports false \
            --firmware-binary true \
            --firmware-chroot true \
            --apt-recommends true

      - name: Patch generated lb config for security mirror
        run: |
          cd live-build-config

          # lb config'in ürettiği dosyaları da patch et
          find config/ -type f | xargs grep -l "bookworm/updates" 2>/dev/null | while read f; do
            echo "Patching config: $f"
            sed -i 's|bookworm/updates|bookworm-security|g' "$f"
          done

          # config/common dosyasını kontrol et ve düzelt
          if [ -f config/common ]; then
            sed -i 's|bookworm/updates|bookworm-security|g' config/common
            cat config/common | grep -i security || true
          fi

          # config/chroot dosyasını kontrol et
          if [ -f config/chroot ]; then
            sed -i 's|bookworm/updates|bookworm-security|g' config/chroot
            cat config/chroot | grep -i security || true
          fi

          # config/binary dosyasını kontrol et
          if [ -f config/binary ]; then
            sed -i 's|bookworm/updates|bookworm-security|g' config/binary
            cat config/binary | grep -i security || true
          fi

          echo "=== Security mirror config check ==="
          grep -r "security" config/ || echo "No security entries found in config"

      - name: Override apt sources
        run: |
          cd live-build-config
          mkdir -p config/archives

          # Chroot build sırasında kullanılacak sources
          cat > config/archives/debian-security.list.chroot << 'EOF'
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

          # Binary (ISO içindeki) sources
          cat > config/archives/debian-security.list.binary << 'EOF'
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

          # Ana sources override
          cat > config/archives/debian.list.chroot << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

          cat > config/archives/debian.list.binary << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

      - name: Add package lists
        run: |
          cd live-build-config
          mkdir -p config/package-lists

          cat > config/package-lists/base.list.chroot << 'EOF'
          live-boot
          live-config
          live-config-systemd
          systemd-sysv
          sudo
          bash
          coreutils
          util-linux
          procps
          grep
          sed
          gawk
          findutils
          tar
          gzip
          bzip2
          xz-utils
          curl
          wget
          ca-certificates
          gnupg
          apt-transport-https
          locales
          keyboard-configuration
          console-setup
          tzdata
          EOF

          cat > config/package-lists/desktop.list.chroot << 'EOF'
          task-gnome-desktop
          gnome-core
          gnome-session
          gnome-shell
          gnome-terminal
          gnome-control-center
          gdm3
          network-manager
          network-manager-gnome
          pulseaudio
          firefox-esr
          EOF

          cat > config/package-lists/tools.list.chroot << 'EOF'
          nano
          vim
          htop
          neofetch
          git
          python3
          python3-pip
          EOF

      - name: Add hooks
        run: |
          cd live-build-config
          mkdir -p config/hooks/live
          mkdir -p config/hooks/normal

          # EN KRİTİK HOOK: chroot içinde apt sources'u düzelt
          # Bu hook build sırasında chroot içinde çalışır
          cat > config/hooks/live/0001-fix-apt-sources.hook.chroot << 'HOOKEOF'
          #!/bin/sh
          set -e

          # Yanlış bookworm/updates security URL'ini kaldır
          if [ -f /etc/apt/sources.list ]; then
            sed -i '/security\.debian\.org.*bookworm\/updates/d' /etc/apt/sources.list
            sed -i '/security\.debian\.org.*bookworm-updates/d' /etc/apt/sources.list
          fi

          # Doğru security URL'ini ekle
          grep -q "bookworm-security" /etc/apt/sources.list 2>/dev/null || \
            echo "deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware" >> /etc/apt/sources.list

          echo "=== Fixed sources.list ==="
          cat /etc/apt/sources.list

          # apt cache'i güncelle (hata olsa da devam et)
          apt-get update 2>&1 | grep -v "bookworm/updates" || true
          HOOKEOF
          chmod +x config/hooks/live/0001-fix-apt-sources.hook.chroot

          cat > config/hooks/live/0010-fix-locale.hook.chroot << 'EOF'
          #!/bin/sh
          set -e
          echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
          locale-gen
          update-locale LANG=en_US.UTF-8
          EOF
          chmod +x config/hooks/live/0010-fix-locale.hook.chroot

          cat > config/hooks/live/0020-enable-gdm.hook.chroot << 'EOF'
          #!/bin/sh
          set -e
          systemctl enable gdm3 || true
          systemctl set-default graphical.target || true
          EOF
          chmod +x config/hooks/live/0020-enable-gdm.hook.chroot

          cat > config/hooks/live/0030-sudo-config.hook.chroot << 'EOF'
          #!/bin/sh
          set -e
          echo "user ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/live-user
          chmod 0440 /etc/sudoers.d/live-user
          EOF
          chmod +x config/hooks/live/0030-sudo-config.hook.chroot

      - name: Add includes
        run: |
          cd live-build-config
          mkdir -p config/includes.chroot/etc/apt
          mkdir -p config/includes.chroot/etc/macnix

          # Doğru sources.list'i chroot'a göm - bu dosya chroot içine kopyalanır
          cat > config/includes.chroot/etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

          cat > config/includes.chroot/etc/macnix/version << 'EOF'
          MACNIX_VERSION="1.0"
          EOF

      - name: Configure bootloader - SYSLINUX (BIOS)
        run: |
          cd live-build-config
          mkdir -p config/bootloaders/syslinux

          cat > config/bootloaders/syslinux/live.cfg << 'EOF'
          label live
            menu label ^Live System
            menu default
            linux /live/vmlinuz
            append initrd=/live/initrd.img boot=live components quiet splash ---

          label live-safe
            menu label ^Live System (safe mode)
            linux /live/vmlinuz
            append initrd=/live/initrd.img boot=live components noapic noapm nodma nomce nolapic nosmp vga=normal
          EOF

          cat > config/bootloaders/syslinux/menu.cfg << 'EOF'
          ui menu.c32
          prompt 0
          timeout 100

          menu title MacNix OS Boot Menu
          menu color title        1;37;40
          menu color border       30;40
          menu color sel          7;37;40

          include live.cfg
          EOF

          cat > config/bootloaders/syslinux/stdmenu.cfg << 'EOF'
          menu color screen       37;40
          menu color border       30;40
          menu color title        1;37;40
          menu color scrollbar    30;40
          menu color sel          7;37;40
          menu color hotsel       1;7;37;40
          menu color disabled     1;30;40
          menu color tabmsg       31;40
          menu color cmdmark      1;36;40
          menu color cmdline      37;40
          menu color pwdborder    30;40
          menu color pwdheader    31;40
          menu color pwdentry     30;40
          menu color timeout_msg  37;40
          menu color timeout      1;37;40
          menu color help         37;40
          menu color msg07        37;40
          EOF

      - name: Configure bootloader - GRUB (EFI)
        run: |
          cd live-build-config
          mkdir -p config/bootloaders/grub-pc

          cat > config/bootloaders/grub-pc/config.cfg << 'EOF'
          if loadfont /boot/grub/font.pf2 ; then
            set gfxmode=auto
            insmod efi_gop
            insmod efi_uga
            insmod gfxterm
            terminal_output gfxterm
          fi

          set default=0
          set timeout=10
          set timeout_style=menu

          menuentry "MacNix OS Live" {
            search --no-floppy --file --set=root /live/vmlinuz
            linux /live/vmlinuz boot=live components quiet splash ---
            initrd /live/initrd.img
          }

          menuentry "MacNix OS Live (safe mode)" {
            search --no-floppy --file --set=root /live/vmlinuz
            linux /live/vmlinuz boot=live components noapic noapm nodma nomce nolapic nosmp vga=normal
            initrd /live/initrd.img
          }
          EOF

      - name: Build ISO
        run: |
          cd live-build-config

          sudo lb clean --purge 2>/dev/null || true

          # Build öncesi son kontrol - üretilen tüm config dosyalarını patch et
          sudo find . -type f -name "*.list" | xargs grep -l "bookworm/updates" 2>/dev/null | while read f; do
            echo "Final patch: $f"
            sudo sed -i 's|security\.debian\.org.*bookworm/updates|security.debian.org/debian-security bookworm-security|g' "$f"
          done

          sudo lb build 2>&1 | tee /tmp/lb-build.log

          if ls *.iso 1> /dev/null 2>&1; then
            echo "✅ ISO build successful!"
            ls -lh *.iso
          else
            echo "❌ ISO build failed"
            echo "=== Last 200 lines ==="
            tail -200 /tmp/lb-build.log
            exit 1
          fi

        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Verify ISO
        run: |
          cd live-build-config
          ISO_FILE=$(ls *.iso | head -1)

          echo "📀 ISO: $ISO_FILE"
          echo "📦 Size: $(du -sh $ISO_FILE | cut -f1)"
          echo "🔍 Type: $(file $ISO_FILE)"

          isoinfo -d -i "$ISO_FILE" || true
          fdisk -l "$ISO_FILE" || true

      - name: Rename ISO
        run: |
          cd live-build-config
          ISO_FILE=$(ls *.iso | head -1)
          NEW_NAME="macnix-os-$(date +%Y%m%d%H%M)-amd64.iso"
          mv "$ISO_FILE" "$NEW_NAME"
          echo "ISO_FILE=$NEW_NAME" >> $GITHUB_ENV
          echo "ISO_PATH=live-build-config/$NEW_NAME" >> $GITHUB_ENV
          echo "✅ Renamed: $NEW_NAME"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: macnix-os-iso
          path: ${{ env.ISO_PATH }}
          retention-days: 7
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/lb-build.log
          retention-days: 3

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v$(date +%Y%m%d%H%M)"
          name: "MacNix OS Build $(date +%Y-%m-%d)"
          body: |
            ## MacNix OS Automated Build
            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message }}

            ### Flash to USB
            ```bash
            sudo dd if=macnix-os-*.iso of=/dev/sdX bs=4M status=progress oflag=sync
            ```
          files: ${{ env.ISO_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
